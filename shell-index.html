<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Makhija</title>
<meta name="description" content="Dinesh Makhija — personal site. Coming soon.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0F1C2E; --ink-soft:#33465C; --slate:#5B6B7F;
  --paper:#F4F6F8; --line:#C9D2DA; --amber:#C98A00; --amber-deep:#9C6B00;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"IBM Plex Mono",monospace;
  background:var(--paper); color:var(--ink);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:28px;
}
main{max-width:640px; width:100%}
.eyebrow{
  font-size:11px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--amber-deep); display:flex; align-items:center; gap:12px; margin-bottom:22px;
}
.eyebrow::before{content:""; width:28px; height:1px; background:var(--amber-deep)}
h1{
  font-family:Archivo,sans-serif; font-weight:800;
  font-size:clamp(40px,8vw,72px); letter-spacing:-.035em; line-height:1.02;
  margin-bottom:26px;
}
h1 .dot{color:var(--amber)}
p{font-size:14px; color:var(--ink-soft); line-height:1.8; max-width:34em}
.status{
  display:inline-flex; align-items:center; gap:10px; margin-top:34px;
  font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--slate);
  border:1px solid var(--line); padding:12px 18px; background:#fff;
}
.status .pulse{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media (prefers-reduced-motion: reduce){.status .pulse{animation:none}}
.links{margin-top:30px; display:flex; gap:22px; font-size:12.5px}
.links a{color:var(--ink); text-decoration:none; border-bottom:1px solid var(--amber)}
.links a:hover{color:var(--amber-deep)}
</style>
</head>
<body>
<main>
  <span class="eyebrow">dineshmakhija.nuvam.ai</span>
  <h1>Dinesh Makhija<span class="dot">.</span></h1>
  <p>Personal site under construction — contributions, the AI-Lab, and notes from two decades of building platforms and teams.</p>
  <span class="status"><span class="pulse"></span>Site in progress · check back soon</span>
  <div class="links">
    <a href="https://nuvam.ai">nuvam.ai</a>
    <a href="https://www.linkedin.com/in/dinesh-makhija-5774141/">LinkedIn</a>
  </div>
</main>
</body>
</html>
